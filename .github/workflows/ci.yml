name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Lint & Test (MCP Server)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: mcp/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: mcp

    - name: Build
      run: npm run build
      working-directory: mcp

    - name: Lint
      run: npm run lint
      working-directory: mcp

    - name: Test
      run: npm test
      working-directory: mcp
